  - id: q_009
    query: "removal"
    difficulty: medium
    category: jargon
    batch: 3
    notes: |
      Player jargon for single-target answers to creatures. Spans five
      sub-categories: destroy (Murder, Terminate), exile (Swords to Plowshares,
      Path to Exile), bounce (Boomerang, Unsummon), edict / forced sacrifice
      (Diabolic Edict, Innocent Blood), and -X/-X (Dismember, Tragic Slip).
      Damage-based removal (Lightning Bolt killing a Llanowar Elves) is
      borderline — it removes creatures in practice but its primary identity
      is "burn" not "removal".
    scryfall_queries:
      - 'o:"destroy target creature" order:edhrec'
      - 'o:"exile target creature" o:"its controller" order:edhrec'
      - 'o:"return target creature" o:"to its owner" order:edhrec'
      - 'o:"target opponent sacrifices a creature" order:edhrec'
      - 'o:"target creature gets -" o:"until end of turn" -t:creature order:edhrec'
