  - id: q_012
    query: "graveyard recursion"
    difficulty: medium
    category: jargon
    batch: 3
    notes: |
      Cards that return creatures from graveyard to battlefield (reanimation)
      or to hand (value recursion). EDHREC cross-validation of the Reanimator
      theme page surfaced major staples my initial Scryfall query missed —
      Reanimate, Animate Dead, Necromancy, Sun Titan, Living Death — because
      I anchored to a specific phrase ("return target creature card from your
      graveyard to the battlefield"). Buried Alive / Entomb deliberately
      excluded — they're graveyard *enablers* (fillers, tutors), not recursion.
    scryfall_queries:
      - 'o:"return target creature card from your graveyard to the battlefield" order:edhrec'
      - 'EDHREC theme page cross-validation: edhrec.com/themes/reanimator (top 25 by inclusion)'
