  - id: q_008
    query: "board wipes"
    difficulty: medium
    category: jargon
    batch: 3
    notes: |
      Player jargon for mass non-targeting permanent removal — community consensus
      (MTG Wiki, Star City Games / Sheldon Menery, Draftsim, EDHREC) defines it as
      an umbrella spanning: creature wipes (Wraths), Disk effects (all non-land
      permanents), Worldslayers (includes lands), artifact wipes, enchantment
      wipes, mass land destruction (MLD — a subset, socially distinct), and
      mass bounce (Cyclonic Rift, Evacuation et al.).
    scryfall_queries:
      - 'o:"destroy all creatures" order:edhrec'
      - 'o:"destroy all nonland permanents" order:edhrec'
      - 'o:"destroy all artifacts" order:edhrec'
      - 'o:"destroy all enchantments" order:edhrec'
      - 'o:"destroy all lands" order:edhrec'
      - '(o:"return all creatures" or o:"return all nonland permanents") o:"hand" order:edhrec'
