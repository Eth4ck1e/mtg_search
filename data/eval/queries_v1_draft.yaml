      semantic ("pinger" = {T}: deal 1 damage to any target). Phase 3
      baseline expects low recall (embedding can't enforce the
      constraints). Phase 4+ with HyDE+SQL: HyDE rewrites "pinger" to
      "{T}: This creature deals 1 damage to any target" for embedding,
