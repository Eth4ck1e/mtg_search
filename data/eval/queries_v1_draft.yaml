  - id: q_006
    query: "ramp spells"
    difficulty: medium
    category: jargon
    batch: 2
    notes: |
      Player jargon for mana acceleration. Original strict reading was "spells
      only" (instants/sorceries/artifacts that produce mana or fetch lands);
      EDHREC cross-validation of the Ramp theme page revealed the community
      uses "ramp" broadly to include ETB-ramp creatures (Sakura-Tribe Elder,
      Wood Elves family) and land-enchantment ramps (Burgeoning, Exploration,
      Wild Growth). Mana dorks (BoP-class) stay in borderline since they tap
      for mana from the battlefield (deferred value) rather than ramping
      on cast.
    scryfall_queries:
      - 'o:"search your library for a basic land card" o:"battlefield" t:sorcery or t:instant'
      - 'name:"Sol Ring" or name:"Mind Stone" or name:"Arcane Signet" or name:"Mana Crypt" or name:"Mana Vault" or name:"Dark Ritual" or name:"Cabal Ritual" or name:"Seething Song"'
      - 'EDHREC theme page cross-validation: edhrec.com/themes/ramp (top 25 by inclusion)'
