services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mtg_search_pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mtg_search}
    ports:
      - "5432:5432"
    volumes:
      - mtg_search_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mtg_search"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mtg_search_pgdata:
